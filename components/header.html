        alt="CVAT Brasil"
        height="38"
        style="display:block;"
      />
    </a>

    <!-- Nav principal (desktop) -->
    <nav class="header-nav" id="header-nav" role="navigation" aria-label="Navegação principal">
      <ul class="nav-list" role="list">

        <li class="nav-item">
          <a href="/index.html" class="nav-link">Home</a>
        </li>
        <li class="nav-item">
          <a href="/pages/para-empresas.html" class="nav-link">Empresa</a>
        </li>
        <li class="nav-item">
          <a href="/pages/para-rh.html" class="nav-link">Profissionais de RH</a>
        </li>
        <li class="nav-item">
          <a href="/pages/para-consultores.html" class="nav-link">Consultores</a>
        </li>
        <li class="nav-item">
          <a href="/pages/treinamentos.html" class="nav-link">Treinamentos CVAT</a>
        </li>
        <li class="nav-item">
          <a href="/pages/blog/index.html" class="nav-link">Blog</a>
        </li>

      </ul>

      <!-- CTAs (mobile) -->
      <div class="nav-mobile-ctas">
        <a href="/pages/diagnostico.html" class="btn btn-secondary">Diagnóstico Grátis</a>
        <a href="/pages/contato.html" class="btn btn-primary">Falar com Especialista</a>
      </div>
    </nav>

    <!-- Ações (desktop) -->
    <div class="header-actions">
      <a href="/pages/diagnostico.html" class="btn btn-secondary btn-sm">
        Diagnóstico Grátis
      </a>
      <a href="/pages/contato.html" class="btn btn-primary btn-sm">
        Falar com Especialista
      </a>

    <!-- Botão hamburguer (mobile) -->
    <button
      class="hamburger"
      id="hamburger"
      aria-label="Abrir menu de navegação"
      aria-expanded="false"
      aria-controls="header-nav"
      type="button"
    >
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
      <span class="hamburger-bar"></span>
    </button>

  </div><!-- /.header-inner -->

  <!-- Overlay mobile -->

<style>
/* ── HEADER BASE ──────────────────────────────────────────────── */
.site-header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background-color: var(--color-white);
  border-bottom: 1.5px solid var(--color-gray-200);
  transition: box-shadow var(--transition);
}

.site-header.scrolled {
  box-shadow: 0 2px 16px rgba(0,0,0,.1);
}

.header-inner {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  height: var(--header-height);
}

/* ── LOGO ────────────────────────────────────────────────────── */
.header-logo {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-shrink: 0;
  text-decoration: none;
}

.header-logo-brand {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--color-blue-dark);
  letter-spacing: .02em;
}

/* ── NAV (desktop) ───────────────────────────────────────────── */
.header-nav {
  display: none;
  margin-left: auto;
}

@media (min-width: 1024px) {
  .header-nav { display: flex; }
}

.nav-list {
  display: flex;
  align-items: center;
  gap: 0;
}

.nav-link {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  min-height: 44px;
  padding: var(--space-2) var(--space-2);
  font-size: .8rem;
  font-weight: 600;
  color: var(--color-blue-dark);
  border-radius: var(--radius-md);
  transition: color var(--transition), background-color var(--transition);
  background: none;
  border: none;
  cursor: pointer;
  white-space: nowrap;
}

@media (min-width: 1280px) {
  .nav-list { gap: var(--space-1); }
  .nav-link {
    padding: var(--space-2) var(--space-3);
    font-size: var(--text-sm);
    gap: var(--space-2);
  }
}

.nav-link:hover,
.nav-link:focus-visible {
  color: var(--color-blue);
  background-color: var(--color-blue-light);
}

.nav-link.active { color: var(--color-blue); }

.nav-badge {
  display: inline-block;
  padding: 1px var(--space-2);
  background-color: var(--color-coral);
  color: var(--color-white);
  font-size: .65rem;
  font-weight: 700;
  letter-spacing: .05em;
  border-radius: var(--radius-full);
  line-height: 1.6;
}

.nav-chevron {
  transition: transform var(--transition);
  flex-shrink: 0;
}

.nav-toggle[aria-expanded="true"] .nav-chevron {
  transform: rotate(180deg);
}

/* ── DROPDOWN ────────────────────────────────────────────────── */
.nav-item { position: relative; }

.dropdown {
  display: none;
  position: absolute;
  top: calc(100% + var(--space-2));
  left: 50%;
  transform: translateX(-50%);
  min-width: 280px;
  background-color: var(--color-white);
  border: 1.5px solid var(--color-gray-200);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: var(--space-3);
  animation: dropdownIn .15s ease;
}

@keyframes dropdownIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.dropdown.open { display: block; }

.dropdown-list { display: flex; flex-direction: column; gap: var(--space-1); }

.dropdown-link {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-3);
  border-radius: var(--radius-md);
  transition: background-color var(--transition);
  text-decoration: none;
}

.dropdown-link:hover,
.dropdown-link:focus-visible {
  background-color: var(--color-blue-light);
}

.dropdown-icon {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  background-color: var(--color-blue-light);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.dropdown-link strong {
  display: block;
  font-size: var(--text-sm);
  color: var(--color-gray-900);
  font-weight: 600;
}

.dropdown-link small {
  display: block;
  font-size: var(--text-xs);
  color: var(--color-gray-500);
  margin-top: 1px;
}

/* ── CTAs mobile (ocultos em desktop) ───────────────────────── */
.nav-mobile-ctas {
  display: none;
}

/* ── HEADER ACTIONS (desktop) ────────────────────────────────── */
.header-actions {
  display: none;
  align-items: center;
  gap: var(--space-2);
  flex-shrink: 0;
}

@media (min-width: 1024px) {
  .header-actions { display: flex; }
}

/* Botões do header um pouco menores em 1024–1279px */
@media (min-width: 1024px) and (max-width: 1279px) {
  .header-actions .btn {
    padding-inline: var(--space-3);
    font-size: .75rem;
  }
}

/* ── HAMBURGUER ──────────────────────────────────────────────── */
.hamburger {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  padding: var(--space-2);
  margin-left: auto;
  transition: background-color var(--transition);
  background: none;
  border: none;
  cursor: pointer;
}

.hamburger:hover { background-color: var(--color-blue-light); }

.hamburger-bar {
  display: block;
  width: 22px;
  height: 2px;
  background-color: var(--color-blue-dark);
  border-radius: 2px;
  transition: transform var(--transition), opacity var(--transition);
  transform-origin: center;
}

.hamburger[aria-expanded="true"] .hamburger-bar:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.hamburger[aria-expanded="true"] .hamburger-bar:nth-child(2) {
  opacity: 0;
  transform: scaleX(0);
}
.hamburger[aria-expanded="true"] .hamburger-bar:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

@media (min-width: 1024px) {
  .hamburger { display: none; }
}

/* ── NAV MOBILE ──────────────────────────────────────────────── */
@media (max-width: 1023px) {
  .header-nav {
    display: flex;
    flex-direction: column;
    position: fixed;
    top: var(--header-height);
    right: 0;
    bottom: 0;
    width: min(320px, 85vw);
    background-color: var(--color-white);
    border-left: 1.5px solid var(--color-gray-200);
    overflow-y: auto;
    padding: var(--space-6) var(--space-5);
    transform: translateX(100%);
    transition: transform .28s cubic-bezier(.4,0,.2,1);
    z-index: 999;
  }

  .header-nav.open {
    transform: translateX(0);
  }

  .nav-list {
    flex-direction: column;
    align-items: stretch;
    gap: var(--space-1);
  }

  .nav-link {
    justify-content: space-between;
    width: 100%;
    padding: var(--space-3) var(--space-4);
  }

  /* Dropdown mobile: accordion */
  .dropdown {
    position: static;
    transform: none;
    box-shadow: none;
    border: none;
    border-left: 3px solid var(--color-blue-light);
    border-radius: 0 var(--radius-md) var(--radius-md) 0;
    margin-left: var(--space-4);
    margin-top: var(--space-2);
    padding: var(--space-2);
    background-color: var(--color-gray-100);
    animation: none;
  }

  /* CTA mobile no final do menu */
  .header-nav::after {
    content: '';
    display: block;
    margin-top: auto;
  }

  .nav-mobile-ctas {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    margin-top: var(--space-8);
    padding-top: var(--space-6);
    border-top: 1.5px solid var(--color-gray-200);
  }
}

/* ── OVERLAY ─────────────────────────────────────────────────── */
.nav-overlay {
  display: none;
  position: fixed;
  inset: 0;
  top: var(--header-height);
  background-color: rgba(0,0,0,.4);
  z-index: 998;
  backdrop-filter: blur(2px);
}

.nav-overlay.visible { display: block; }
</style>
